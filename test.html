<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>QuickTools Upload</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;

  background:
    radial-gradient(circle at top,
      rgba(35,80,45,.22),
      transparent 35%),
    linear-gradient(
      180deg,
      #05070b 0%,
      #060a12 100%
    );

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;
}

/* BACK GLOW */

.bg-glow{
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(
    circle,
    rgba(85,200,79,.10),
    transparent 70%
  );
  filter:blur(40px);
  top:-250px;
  left:50%;
  transform:translateX(-50%);
  pointer-events:none;
}

/* MAIN */

.wrapper{
  width:100%;
  max-width:640px;
  padding:40px 24px;
  position:relative;
  z-index:2;
}

.logo{
  text-align:center;
  margin-bottom:18px;
}

.logo h1{
  font-size:72px;
  font-weight:800;
  color:#55c84f;
  letter-spacing:-2px;
  line-height:1;

  text-shadow:
    0 0 20px rgba(85,200,79,.15);
}

.subtitle{
  text-align:center;
  color:#7f8b9b;
  font-size:18px;
  margin-bottom:42px;
}

/* CARD */

.upload-card{

  position:relative;

  background:
    linear-gradient(
      180deg,
      rgba(15,20,29,.96) 0%,
      rgba(9,13,20,.98) 100%
    );

  border:1px solid #1a2230;

  border-radius:34px;

  padding:28px;

  box-shadow:
    0 30px 80px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.03);
}

.upload-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:34px;
  padding:1px;

  background:
    linear-gradient(
      180deg,
      rgba(85,200,79,.18),
      rgba(255,255,255,.02)
    );

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;
          mask-composite:exclude;
}

/* DROPZONE */

.dropzone{

  position:relative;

  min-height:380px;

  border-radius:26px;

  border:2px dashed rgba(85,200,79,.22);

  background:
    radial-gradient(circle at top,
      rgba(85,200,79,.08),
      transparent 55%),
    #070b12;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;

  overflow:hidden;

  transition:.25s;
}

.dropzone:hover{
  border-color:rgba(85,200,79,.45);

  box-shadow:
    0 0 50px rgba(85,200,79,.08),
    inset 0 0 40px rgba(85,200,79,.03);

  transform:translateY(-2px);
}

/* GRID EFFECT */

.grid{
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

  background-size:30px 30px;

  mask-image:radial-gradient(circle at center, black 35%, transparent 90%);
}

/* ICON */

.icon-wrap{
  position:relative;
  width:130px;
  height:130px;

  border-radius:32px;

  margin-bottom:30px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      180deg,
      rgba(85,200,79,.18),
      rgba(85,200,79,.05)
    );

  border:1px solid rgba(85,200,79,.18);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 10px 40px rgba(0,0,0,.35);
}

.icon{
  font-size:62px;
}

/* TEXT */

.dropzone h2{
  font-size:34px;
  font-weight:700;
  line-height:1.2;
  margin-bottom:14px;
  letter-spacing:-1px;
}

.dropzone p{
  color:#7f8b9b;
  font-size:16px;
  margin-bottom:34px;
}

/* BUTTON */

.browse-btn{
  height:58px;
  padding:0 34px;

  border:none;
  border-radius:18px;

  background:#1b2330;

  color:#fff;

  font-size:16px;
  font-weight:600;

  cursor:pointer;

  transition:.2s;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03);
}

.browse-btn:hover{
  background:#243041;
  transform:translateY(-1px);
}

/* ACTION BUTTON */

.action{
  display:flex;
  justify-content:center;
}

.create-btn{

  margin-top:36px;

  height:64px;
  min-width:260px;

  border:none;
  border-radius:20px;

  background:#55c84f;
  color:#071107;

  font-size:18px;
  font-weight:700;

  cursor:pointer;

  box-shadow:
    0 15px 40px rgba(85,200,79,.22);

  transition:.2s;
}

.create-btn:hover{
  transform:translateY(-2px);
  background:#4db947;
}

/* FOOTER */

.footer{
  margin-top:28px;
  text-align:center;
  color:#566171;
  font-size:13px;
  letter-spacing:1px;
}

/* RESPONSIVE */

@media(max-width:640px){

  .logo h1{
    font-size:52px;
  }

  .subtitle{
    font-size:15px;
    margin-bottom:30px;
  }

  .upload-card{
    padding:18px;
    border-radius:24px;
  }

  .dropzone{
    min-height:320px;
    padding:24px;
  }

  .icon-wrap{
    width:100px;
    height:100px;
    border-radius:24px;
  }

  .icon{
    font-size:48px;
  }

  .dropzone h2{
    font-size:26px;
  }

  .browse-btn,
  .create-btn{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="wrapper">

  <div class="logo">
    <h1>QuickTools</h1>
  </div>

  <div class="subtitle">
    Инструменты для работы с рекламными проектами
  </div>

  <div class="upload-card">

    <div class="dropzone">

      <div class="grid"></div>

      <div class="icon-wrap">
        <div class="icon">📁</div>
      </div>

      <h2>
        Перетащите папку проекта сюда
      </h2>

      <p>
        или выберите директорию вручную
      </p>

      <button class="browse-btn">
        Выбрать папку
      </button>

    </div>

  </div>

  <div class="action">
    <button class="create-btn">
      Создать проект
    </button>
  </div>

  <div class="footer">
    QUICKTOOLS • CREATIVE PRODUCTION SYSTEM
  </div>

</div>

</body>
</html>
